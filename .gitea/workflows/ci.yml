name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  IMAGE_NAME: scut-ai-proxy

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Test
        run: cargo test --locked

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build --pull -t "${IMAGE_NAME}:${GITHUB_SHA}" .
